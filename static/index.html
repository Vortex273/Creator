<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Пользовательских Сценариев</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Платформа для подготовки мероприятий по культурам народов России</h1>
        </header>

        <form id="scenarioForm" class="card">
            <div class="form-group">
                <label for="username">Тема мероприятия:</label>
                <input type="text" id="username" name="username" placeholder="Введите тему:">
            </div>

            <div class="form-group">
                <label for="age_group">Для кого?</label>
                <select id="age_group" name="age_group" required>
                    <option value="">Выберите возраст</option>
                    <option value="">Младшие классы</option>
                    <option value="">Средние классы</option>
                    <option value="">Страшие классы</option>
                </select>
            </div>

            <div class="form-group">
                <label for="participants">Количество участников</label>
                <select id="participants" name="participants" required>
                    <option value="">До 10</option>
                    <option value="">До 25</option>
                    <option value="">более 50</option>
                </select>
            </div>

            <div class="form-group">
                <label for="time">Длительность мероприятия?</label>
                <select id="time" name="time" required>
                    <option value="">30 мин</option>
                    <option value="">60 мин</option>
                    <option value="">несколько часов</option>
                </select>
            </div>

            <div class="form-group">
                <label for="experience">Был ли опыт проведения подобных мероприятий?</label>
                <select id="experience" name="experience" required>
                    <option value="">Да</option>
                    <option value="">Нет</option>
                </select>
            </div>


            <div class="form-group">
                <label for="gender">Пол выступающего</label>
                <select id="gender" name="gender" required>
                    <option value="">Мужчина</option>
                    <option value="">Женщина</option>
                </select>
            </div>

            <div class="form-group">
                <label for="item"> Подручные вещи или интерактивные устройства:</label>
                <input type="text" id="item" name="item" placeholder="Название устройства:">
            </div>



            <button type="submit" id="submitBtn">Сгенерировать сценарии</button>
        </form>

        <section id="results"></section>
    </main>
    <script src="script.js"></script>
</body>
</html>
